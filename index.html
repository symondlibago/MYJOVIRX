  <body>
    <script>
      // Apply the saved Design Studio theme before paint (prevents a flash of the default theme).
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem("myjovirx-theme") || "{}");
          var r = document.documentElement;
          if (s.palette) r.setAttribute("data-palette", s.palette);
          if (s.font) r.setAttribute("data-font", s.font);
          if (s.weight) r.setAttribute("data-weight", s.weight);
          if (s.italic) r.setAttribute("data-italic", s.italic);
          if (s.design) r.setAttribute("data-design", s.design);
          // Re-apply any saved per-palette color edits as inline vars.
          var c = (s.customColors || {})[s.palette] || {};
          var vmap = {
            primary: ["--color-brand"],
            deep: ["--color-brand-deep"],
            accent: ["--color-gold"],
            bg: ["--color-ivory", "--color-cream"],
          };
          var rmap = {
            primary: "--brand-rgb",
            deep: "--brand-deep-rgb",
            accent: "--gold-rgb",
            bg: "--cream-rgb",
          };
          var h2r = function (h) {
            h = h.replace("#", "");
            if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
            var n = parseInt(h, 16);
            return ((n >> 16) & 255) + " " + ((n >> 8) & 255) + " " + (n & 255);
          };
          Object.keys(vmap).forEach(function (k) {
            if (c[k]) {
              vmap[k].forEach(function (v) {
                r.style.setProperty(v, c[k]);
              });
              if (rmap[k]) r.style.setProperty(rmap[k], h2r(c[k]));
            }
          });
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
