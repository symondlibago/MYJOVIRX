    <script>
      // Apply the saved Design Studio theme before paint (prevents a flash of the
      // default theme). Also exposed as a postMessage handler so the Design
      // Studio's device-preview iframe live-updates as you edit.
      (function () {
        var r = document.documentElement;
        var vmap = {
          primary: ["--color-brand"],
          deep: ["--color-brand-deep"],
          accent: ["--color-gold"],
          bg: ["--color-ivory", "--color-cream"],
        };
        var rmap = {
          primary: "--brand-rgb",
          deep: "--brand-deep-rgb",
          accent: "--gold-rgb",
          bg: "--cream-rgb",
        };
        var h2r = function (h) {
          h = h.replace("#", "");
          if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
          var n = parseInt(h, 16);
          return ((n >> 16) & 255) + " " + ((n >> 8) & 255) + " " + (n & 255);
        };
        function applyTheme(s) {
          if (!s) return;
          if (s.palette) r.setAttribute("data-palette", s.palette);
          if (s.font) r.setAttribute("data-font", s.font);
          if (s.weight) r.setAttribute("data-weight", s.weight);
          if (s.italic) r.setAttribute("data-italic", s.italic);
          if (s.design) r.setAttribute("data-design", s.design);
          if (s.txLayout) {
            r.setAttribute("data-tx-layout", s.txLayout);
            try {
              window.dispatchEvent(
                new CustomEvent("myjovirx-tx-layout", { detail: s.txLayout })
              );
            } catch (e) {}
          }
          if (s.tmLayout) {
            r.setAttribute("data-tm-layout", s.tmLayout);
            try {
              window.dispatchEvent(
                new CustomEvent("myjovirx-tm-layout", { detail: s.tmLayout })
              );
            } catch (e) {}
          }
          // Set or clear each per-palette color edit (so edits never bleed).
          var c = (s.customColors || {})[s.palette] || {};
          Object.keys(vmap).forEach(function (k) {
            if (c[k]) {
              vmap[k].forEach(function (v) {
                r.style.setProperty(v, c[k]);
              });
              if (rmap[k]) r.style.setProperty(rmap[k], h2r(c[k]));
            } else {
              vmap[k].forEach(function (v) {
                r.style.removeProperty(v);
              });
              if (rmap[k]) r.style.removeProperty(rmap[k]);
            }
          });
        }
        try {
          applyTheme(JSON.parse(localStorage.getItem("myjovirx-theme") || "{}"));
        } catch (e) {}
        // Live updates from the parent Design Studio when shown in the preview iframe.
        window.addEventListener("message", function (e) {
          if (e.data && e.data.__myjovirxTheme) applyTheme(e.data.__myjovirxTheme);
        });
      })();
    </script>
